<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>텍스트 → 영상 스튜디오 🎬</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Nanum+Gothic:wght@400;700;800&family=Black+Han+Sans&family=Jua&family=Do+Hyeon&family=Gugi&family=Yeon+Sung&family=Gowun+Dodum&family=Gowun+Batang:wght@400;700&family=Nanum+Myeongjo:wght@400;700;800&family=Song+Myung&family=Gaegu:wght@400;700&family=Nanum+Pen+Script&family=Nanum+Brush+Script&family=Gamja+Flower&family=Dongle:wght@400;700&family=Hi+Melody&family=Kirang+Haerang&family=Dokdo&family=Cute+Font&family=Poppins:wght@400;600;800&family=Bebas+Neue&family=Anton&display=swap" rel="stylesheet">
<link rel="stylesheet" href="studio.css?v=6">
</head>
<body>
<div class="app">

  <!-- 컨트롤 패널 -->
  <aside class="panel">
    <h1>텍스트 → 영상 🎬</h1>
    <div class="sub">내용·폰트·움직임을 정하고 영상으로 내보내세요.</div>

    <!-- 1. 내용 -->
    <div class="field">
      <label>① 내용 <span style="font-weight:400">(Enter 로 줄바꿈)</span></label>
      <textarea id="text" rows="3"></textarea>
    </div>

    <!-- 2. 폰트 -->
    <div class="field">
      <label>② 폰트</label>
      <select id="font">
        <optgroup label="고딕 / 임팩트">
          <option value="Black Han Sans">블랙한산스 (굵은 임팩트)</option>
          <option value="Noto Sans KR">노토 산스 (기본 고딕)</option>
          <option value="Nanum Gothic">나눔고딕</option>
          <option value="Do Hyeon">도현</option>
          <option value="Jua">주아 (둥글둥글)</option>
          <option value="Yeon Sung">연성 (둥근 굵은)</option>
          <option value="Gugi">구기 (레트로 임팩트)</option>
          <option value="Gowun Dodum">고운돋움</option>
        </optgroup>
        <optgroup label="명조 / 세리프">
          <option value="Nanum Myeongjo">나눔명조</option>
          <option value="Gowun Batang">고운바탕</option>
          <option value="Song Myung">송명 (우아한 세리프)</option>
        </optgroup>
        <optgroup label="손글씨 / 붓글씨">
          <option value="Gaegu">개구 (손글씨)</option>
          <option value="Nanum Pen Script">나눔 펜 (손글씨)</option>
          <option value="Gamja Flower">감자꽃 (귀여운)</option>
          <option value="Dongle">동글 (말랑 둥근)</option>
          <option value="Hi Melody">하이멜로디</option>
          <option value="Cute Font">큐트 (귀여운)</option>
          <option value="Kirang Haerang">기랑해랑 (붓 느낌)</option>
          <option value="Nanum Brush Script">나눔 붓글씨</option>
          <option value="Dokdo">독도 (거친 손글씨)</option>
        </optgroup>
        <optgroup label="영문">
          <option value="Poppins">Poppins</option>
          <option value="Bebas Neue">Bebas Neue</option>
          <option value="Anton">Anton</option>
        </optgroup>
      </select>
    </div>

    <div class="row2">
      <div class="field">
        <label>두께</label>
        <select id="weight">
          <option value="300">가늘게</option>
          <option value="400" selected>보통</option>
          <option value="700">굵게</option>
          <option value="900">아주굵게</option>
        </select>
      </div>
      <div class="field">
        <label>글자색</label>
        <input type="color" id="color">
      </div>
    </div>

    <div class="field">
      <label>강조색 <span style="font-weight:400;color:var(--ink2)">(하이라이트·박스·밑줄)</span></label>
      <input type="color" id="accent">
    </div>

    <div class="field">
      <label>크기 <span class="val" id="sizeVal">150</span></label>
      <input type="range" id="size" min="40" max="360" step="2">
    </div>

    <div class="row2">
      <div class="field">
        <label>줄간격 <span class="val" id="lineSpacingVal">1.20</span></label>
        <input type="range" id="lineSpacing" min="1" max="2.2" step="0.05">
      </div>
      <div class="field">
        <label>밑줄 굵기 <span class="val" id="ulWeightVal">0.05</span></label>
        <input type="range" id="ulWeight" min="0.02" max="0.16" step="0.01">
      </div>
    </div>

    <!-- 3. 애니메이션 -->
    <div class="field">
      <label>③ 움직이는 방식</label>
      <select id="anim"></select>
    </div>

    <div class="row2">
      <div class="field">
        <label>배경색</label>
        <select id="bg">
          <option value="cream">크림</option>
          <option value="white">흰색</option>
          <option value="black">검정</option>
          <option value="olive">올리브 그라데</option>
          <option value="sunset">노을 그라데</option>
          <option value="night">밤하늘 그라데</option>
          <option value="sky">하늘 그라데</option>
        </select>
      </div>
      <div class="field">
        <label>비율</label>
        <select id="ratio">
          <option value="1:1">1:1 (정사각)</option>
          <option value="9:16">9:16 (릴스/쇼츠)</option>
          <option value="16:9">16:9 (유튜브)</option>
          <option value="4:5">4:5 (피드)</option>
        </select>
      </div>
    </div>

    <!-- 배경 이미지 -->
    <div class="field">
      <label>배경 이미지 <span class="val" id="bgImgName" style="font-weight:400;color:var(--ink2)">없음</span></label>
      <div class="row2" style="grid-template-columns:1fr auto auto;gap:8px;align-items:stretch">
        <label class="filebtn">📷 이미지 선택<input type="file" id="bgImg" accept="image/*" hidden></label>
        <select id="bgFit" style="width:auto">
          <option value="cover">꽉 채움</option>
          <option value="contain">전체 보임</option>
        </select>
        <button type="button" id="bgImgClear" class="minibtn">제거</button>
      </div>
    </div>

    <div class="field">
      <label>이미지 움직임</label>
      <select id="imgAnim">
        <option value="none">없음 (고정)</option>
        <option value="zoomIn">천천히 확대</option>
        <option value="forward">중앙에서 앞으로 등장</option>
        <option value="kenBurns">확대 + 이동 (켄번스)</option>
      </select>
    </div>
    <div class="field">
      <label>이미지 확대 <span class="val" id="imgZoomVal">1.00</span></label>
      <input type="range" id="imgZoom" min="0.5" max="3" step="0.05">
    </div>
    <div class="row2">
      <div class="field">
        <label>← 이미지 좌우 →</label>
        <input type="range" id="imgX" min="-0.5" max="0.5" step="0.01" value="0">
      </div>
      <div class="field">
        <label>↑ 이미지 상하 ↓</label>
        <input type="range" id="imgY" min="-0.5" max="0.5" step="0.01" value="0">
      </div>
    </div>

    <!-- 글씨 위치 -->
    <div class="field">
      <label>글씨 위치</label>
      <div class="row2">
        <select id="alignH">
          <option value="left">⬅ 왼쪽</option>
          <option value="center" selected>↔ 가운데</option>
          <option value="right">오른쪽 ➡</option>
        </select>
        <select id="alignV">
          <option value="top">⬆ 위</option>
          <option value="middle" selected>↕ 가운데</option>
          <option value="bottom">⬇ 아래</option>
        </select>
      </div>
    </div>
    <div class="row2">
      <div class="field">
        <label>← 좌우 미세조정 →</label>
        <input type="range" id="offX" min="-600" max="600" step="5" value="0">
      </div>
      <div class="field">
        <label>↑ 상하 미세조정 ↓</label>
        <input type="range" id="offY" min="-900" max="900" step="5" value="0">
      </div>
    </div>
    <div class="field">
      <label class="check"><input type="checkbox" id="shadow"> 글씨 그림자 (사진 위 가독성 ↑)</label>
    </div>

    <div class="field">
      <label>길이 <span class="val" id="durVal">3초</span></label>
      <input type="range" id="dur" min="1" max="10" step="1">
    </div>

    <!-- 4. 내보내기 -->
    <div class="btns">
      <button class="btn-replay" id="replay">↻ 다시재생</button>
      <button class="btn-export" id="export">④ 영상으로 내보내기</button>
    </div>
    <div class="status" id="status"></div>

    <div class="tip">
      💡 미리보기는 자동 반복돼요. <b>내보내기</b>를 누르면 설정한 길이만큼 녹화해<br>
      영상 파일이 다운로드됩니다. (크롬: webm, 사파리: mp4)
    </div>
  </aside>

  <!-- 미리보기 -->
  <main class="preview">
    <div class="stage-wrap">
      <canvas id="stage" width="1080" height="1080"></canvas>
    </div>
    <div class="hint">미리보기</div>
  </main>

</div>
<script src="studio.js?v=6"></script>
</body>
</html>
