<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모딜 — 관리자 콘솔</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
body { background: var(--cream2); }

.admin-layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  min-height: 100vh;
}
.sidebar {
  background: var(--paper);
  border-right: 1px solid var(--line);
  padding: 1.5rem 0;
  box-shadow: 2px 0 12px rgba(228,53,52,0.04);
}
.sb-brand {
  padding: 0 1.25rem 1.25rem;
  border-bottom: 1px solid var(--line);
  margin-bottom: 1rem;
  display: flex; align-items: center; gap: 10px;
  text-decoration: none;
}
.sb-brand-img {
  width: 40px; height: 40px;
  background: var(--coral-soft);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}
.sb-brand-img img { width: 130%; margin-top: 6%; }
.sb-brand-text h1 { font-size: 16px; font-weight: 900; color: var(--coral-dark); line-height: 1; }
.sb-brand-text small { font-size: 9px; color: var(--ink3); letter-spacing: 0.1em; display: block; margin-top: 4px; }

.sb-section { padding: 0.5rem 1.25rem; font-size: 10px; letter-spacing: 0.1em; color: var(--ink3); text-transform: uppercase; margin-top: 1rem; font-weight: 700; }
.sb-link {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 1.25rem;
  font-size: 13px; font-weight: 600; color: var(--ink2);
  cursor: pointer; transition: background 0.15s, color 0.15s;
  border-left: 3px solid transparent;
}
.sb-link:hover { background: var(--cream); color: var(--coral-dark); }
.sb-link.active {
  background: var(--coral-soft); color: var(--coral-dark);
  border-left-color: var(--coral);
}
.sb-icon { font-size: 16px; }
.sb-back {
  margin: 1.5rem 1.25rem 0;
  padding: 10px 12px;
  background: var(--cream);
  color: var(--ink2);
  border-radius: 8px;
  font-size: 12px; font-weight: 600;
  text-decoration: none;
  display: block;
  text-align: center;
}
.sb-back:hover { background: var(--coral-soft); color: var(--coral-dark); }

.main { padding: 2rem; overflow-x: auto; }
.page-head {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 1.5rem; padding-bottom: 1rem;
  border-bottom: 1px solid var(--line);
}
.page-title { font-size: 24px; font-weight: 900; color: var(--ink); }
.page-sub { font-size: 12px; color: var(--ink3); margin-top: 4px; }
.page-actions { display: flex; gap: 8px; }
.btn {
  font-size: 12px; font-weight: 600;
  padding: 9px 14px; border-radius: 8px;
  cursor: pointer; border: 1px solid var(--line2);
  background: var(--paper); color: var(--ink);
  transition: all 0.15s;
}
.btn:hover { border-color: var(--coral); color: var(--coral); }
.btn.primary { background: var(--coral); color: #fff; border-color: var(--coral); }
.btn.primary:hover { background: var(--coral-dark); color: #fff; }
.btn.danger { background: var(--paper); color: var(--coral-dark); border-color: var(--coral-soft); }
.btn.danger:hover { background: var(--coral-dark); color: #fff; border-color: var(--coral-dark); }
.btn.sm { padding: 5px 11px; font-size: 11px; }

.kpi-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  margin-bottom: 2rem;
}
.kpi-card {
  background: var(--paper);
  border-radius: 16px;
  padding: 1.5rem;
  box-shadow: 0 4px 12px rgba(228,53,52,0.06);
}
.kpi-label { font-size: 11px; color: var(--ink3); margin-bottom: 8px; letter-spacing: 0.04em; font-weight: 600; }
.kpi-value { font-size: 32px; font-weight: 900; color: var(--coral-dark); line-height: 1; }
.kpi-sub { font-size: 11px; color: var(--green); margin-top: 8px; font-weight: 600; }
.kpi-sub.down { color: var(--coral-dark); }

.card {
  background: var(--paper);
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  box-shadow: 0 4px 12px rgba(228,53,52,0.04);
}
.card-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 1.25rem;
}
.card-title { font-size: 15px; font-weight: 800; color: var(--ink); }
.card-sub { font-size: 11px; color: var(--ink3); margin-top: 2px; }

table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th {
  text-align: left;
  font-size: 10px; font-weight: 700;
  color: var(--ink3); letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 10px 12px;
  border-bottom: 2px solid var(--line);
  background: var(--cream);
}
tbody td {
  padding: 13px 12px;
  border-bottom: 1px solid var(--line);
  color: var(--ink2);
}
tbody tr { transition: background 0.15s; }
tbody tr:hover { background: var(--cream); }
.pill {
  display: inline-block; font-size: 10px; font-weight: 700;
  padding: 3px 10px; border-radius: 100px;
}
.pill.green { background: rgba(56,168,122,0.15); color: var(--green); }
.pill.orange { background: var(--coral-soft); color: var(--coral-dark); }
.pill.blue { background: rgba(24,95,165,0.15); color: #185FA5; }
.pill.gray { background: var(--cream3); color: var(--ink2); }
.pill.red { background: rgba(228,53,52,0.15); color: var(--coral-dark); }

input.editable, select.editable, textarea.editable {
  width: 100%;
  background: var(--cream);
  border: 1px solid var(--line2);
  border-radius: 8px;
  padding: 9px 12px;
  font-size: 12px;
  color: var(--ink);
  outline: none;
}
input.editable:focus, select.editable:focus, textarea.editable:focus {
  border-color: var(--coral); background: var(--paper);
  box-shadow: 0 0 0 3px rgba(228,53,52,0.08);
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}
.form-row .full { grid-column: 1 / -1; }
.form-row label { font-size: 11px; color: var(--ink2); display: block; margin-bottom: 5px; font-weight: 700; }

.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(45,27,20,0.5);
  display: none;
  align-items: center; justify-content: center;
  z-index: 999;
  padding: 1rem;
  backdrop-filter: blur(4px);
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--paper);
  border-radius: 20px;
  padding: 2rem;
  width: 100%;
  max-width: 520px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal-title { font-size: 18px; font-weight: 900; margin-bottom: 1rem; color: var(--ink); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.5rem; }

.kakao-preview {
  background: #FEE500;
  color: #3B1E1E;
  border-radius: 16px;
  padding: 1rem;
  max-width: 320px;
  margin: 1rem 0;
  font-size: 13px;
  line-height: 1.6;
  white-space: pre-line;
}
.kakao-preview .kkk-head {
  font-size: 11px;
  background: #3B1E1E;
  color: #FEE500;
  padding: 4px 10px;
  border-radius: 100px;
  display: inline-block;
  font-weight: 700;
  margin-bottom: 10px;
}
.kakao-preview .kkk-link {
  margin-top: 12px;
  background: rgba(0,0,0,0.08);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 12px;
  font-weight: 700;
  text-align: center;
}

@media (max-width: 768px) {
  .admin-layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .main { padding: 1rem; }
}
</style>
</head>
<body>

<div class="admin-layout">

<aside class="sidebar">
  <a class="sb-brand" href="index.html">
    <div class="sb-brand-img"><img src="sosik.png" alt="소식이"></div>
    <div class="sb-brand-text">
      <h1 id="adminBrand">모딜</h1>
      <small>ADMIN CONSOLE</small>
    </div>
  </a>

  <div class="sb-section">메인</div>
  <div class="sb-link active" data-page="dashboard">
    <span class="sb-icon">📊</span>대시보드
  </div>

  <div class="sb-section">운영</div>
  <div class="sb-link" data-page="members"><span class="sb-icon">👥</span>회원 관리</div>
  <div class="sb-link" data-page="requests"><span class="sb-icon">📬</span>요청 관리</div>
  <div class="sb-link" data-page="partners"><span class="sb-icon">🏪</span>제휴 신청 관리</div>
  <div class="sb-link" data-page="nego"><span class="sb-icon">🤝</span>네고딜 관리</div>
  <div class="sb-link" data-page="deals"><span class="sb-icon">🛒</span>공동구매 관리</div>
  <div class="sb-link" data-page="orders"><span class="sb-icon">📦</span>주문·배송 관리</div>
  <div class="sb-link" data-page="plaza"><span class="sb-icon">📢</span>딜 광장 관리</div>

  <div class="sb-section">고객 발송</div>
  <div class="sb-link" data-page="coupons"><span class="sb-icon">🎟️</span>쿠폰 관리</div>
  <div class="sb-link" data-page="kakao"><span class="sb-icon">💬</span>카톡 쿠폰발송</div>

  <div class="sb-section">거점</div>
  <div class="sb-link" data-page="spots"><span class="sb-icon">📍</span>17개 거점 관리</div>

  <div class="sb-section">시스템</div>
  <div class="sb-link" data-page="site"><span class="sb-icon">⚙️</span>사이트 설정</div>

  <div class="sb-section">채널 바로가기</div>
  <a class="sb-link" href="index.html" style="text-decoration:none"><span class="sb-icon">🖥️</span>PC 홈페이지</a>
  <a class="sb-link" href="모딜 모바일.html" style="text-decoration:none"><span class="sb-icon">📱</span>모바일 홈페이지</a>
  <a class="sb-link" href="모딜 미리보기.html" style="text-decoration:none"><span class="sb-icon">🔀</span>PC·모바일 비교</a>

  <a class="sb-back" href="index.html">← 사용자 페이지로</a>
</aside>

<main class="main" id="main"></main>

</div>

<div class="modal-overlay" id="modal">
  <div class="modal" id="modalContent"></div>
</div>

<script src="data.js"></script>
<script>
let DATA = loadData();
let currentPage = 'dashboard';

document.querySelectorAll('.sb-link').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.sb-link').forEach(l => l.classList.remove('active'));
    el.classList.add('active');
    currentPage = el.dataset.page;
    renderPage();
  });
});

function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modal').classList.add('show');
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
}
document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') closeModal();
});

function save() {
  saveData(DATA);
  renderPage();
}

function renderPage() {
  if (currentPage === 'dashboard') return renderDashboard();
  if (currentPage === 'members') return renderMembers();
  if (currentPage === 'requests') return renderRequests();
  if (currentPage === 'partners') return renderPartnersAdmin();
  if (currentPage === 'nego') return renderNego();
  if (currentPage === 'deals') return renderDeals();
  if (currentPage === 'orders') return renderOrders();
  if (currentPage === 'coupons') return renderCoupons();
  if (currentPage === 'kakao') return renderKakao();
  if (currentPage === 'spots') return renderSpots();
  if (currentPage === 'site') return renderSite();
  if (currentPage === 'plaza') return renderPlaza();
}

function renderDashboard() {
  const totalRevenue = DATA.orders.reduce((sum, o) => sum + o.amount, 0);
  const totalOrders = DATA.orders.length;
  const pendingOrders = DATA.orders.filter(o => o.status === 'preparing' || o.status === 'pickup_ready').length;
  const activeRequests = DATA.requests.length;

  document.getElementById('main').innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">대시보드</div>
        <div class="page-sub">소식이가 정리한 오늘의 운영 현황</div>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#2D1410,#46201A);color:#fff;border-radius:16px;padding:16px 20px;margin-bottom:20px;flex-wrap:wrap">
      <div style="font-size:26px">🎛️</div>
      <div style="flex:1;min-width:200px">
        <div style="font-size:14px;font-weight:800">통합 관리 — PC · 모바일 한 번에</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.72);margin-top:3px">여기서 수정한 딜·요청·제휴·거점은 <b style="color:#FF8B72">PC 홈페이지</b>와 <b style="color:#FF8B72">모바일 홈페이지</b>에 동시에 반영돼요.</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <a href="index.html" style="text-decoration:none;background:rgba(255,255,255,0.12);color:#fff;font-size:12px;font-weight:700;padding:9px 15px;border-radius:100px">🖥️ PC 홈</a>
        <a href="모딜 모바일.html" style="text-decoration:none;background:rgba(255,255,255,0.12);color:#fff;font-size:12px;font-weight:700;padding:9px 15px;border-radius:100px">📱 모바일 홈</a>
        <a href="모딜 미리보기.html" style="text-decoration:none;background:#F86D53;color:#fff;font-size:12px;font-weight:700;padding:9px 15px;border-radius:100px">🔀 비교 보기</a>
      </div>
    </div>

    <div class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-label">함께한 친구</div>
        <div class="kpi-value">${fmt(DATA.stats.totalMembers)}</div>
        <div class="kpi-sub">↑ 이번 달 +124</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">성사된 딜</div>
        <div class="kpi-value">${DATA.stats.successDeals}</div>
        <div class="kpi-sub">↑ 이번 달 +5</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">진행 중 네고</div>
        <div class="kpi-value">${DATA.negoDeals.length}</div>
        <div class="kpi-sub">활성 협상</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">누적 거래액</div>
        <div class="kpi-value">${fmt(Math.round(totalRevenue/10000))}만</div>
        <div class="kpi-sub">건당 평균 ${fmt(Math.round(totalRevenue/totalOrders))}원</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">처리 대기 주문</div>
        <div class="kpi-value">${pendingOrders}</div>
        <div class="kpi-sub down">즉시 처리 필요</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">신규 요청</div>
        <div class="kpi-value">${activeRequests}</div>
        <div class="kpi-sub">검토 대기</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">제휴 신청</div>
        <div class="kpi-value">${(DATA.partners || []).length}</div>
        <div class="kpi-sub down">${(DATA.partners || []).filter(p => p.status === 'review').length}건 검토 대기</div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <div><div class="card-title">최근 주문</div><div class="card-sub">처리가 필요한 최근 주문 5건</div></div>
        <button class="btn" onclick="goTo('orders')">전체 주문 →</button>
      </div>
      <table>
        <thead><tr><th>주문번호</th><th>회원</th><th>상품</th><th>금액</th><th>수령방법</th><th>상태</th></tr></thead>
        <tbody>${DATA.orders.slice(0,5).map(o => `
          <tr>
            <td><b>${o.id}</b></td>
            <td>${o.member}</td>
            <td>${o.deal}</td>
            <td>${fmt(o.amount)}원</td>
            <td>${o.pickup}</td>
            <td>${statusPill(o.status)}</td>
          </tr>`).join('')}</tbody>
      </table>
    </div>

    <div class="card">
      <div class="card-head">
        <div><div class="card-title">요청 현황 TOP 5</div><div class="card-sub">소식이가 검토 중인 인기 요청</div></div>
      </div>
      <table>
        <thead><tr><th>요청 항목</th><th>지역</th><th>요청 수</th><th>상태</th></tr></thead>
        <tbody>${DATA.requests.slice(0,5).map(r => `
          <tr>
            <td>${r.icon} ${r.name}</td>
            <td>${r.meta}</td>
            <td><b>${r.count}명</b></td>
            <td><span class="pill ${r.status === 'live' ? 'orange' : 'gray'}">${r.status === 'live' ? '협상중' : '검토 중'}</span></td>
          </tr>`).join('')}</tbody>
      </table>
    </div>
  `;
}

function goTo(page) {
  currentPage = page;
  document.querySelectorAll('.sb-link').forEach(l => l.classList.remove('active'));
  document.querySelector('[data-page=' + page + ']').classList.add('active');
  renderPage();
}

function statusPill(s) {
  const map = {
    preparing:    { c: 'orange', t: '준비중' },
    pickup_ready: { c: 'blue', t: '픽업대기' },
    shipped:      { c: 'blue', t: '배송중' },
    completed:    { c: 'green', t: '완료' },
    cancelled:    { c: 'red',   t: '취소' },
    pending_transfer: { c: 'orange', t: '입금대기' },
  };
  const m = map[s] || { c: 'gray', t: s };
  return `<span class="pill ${m.c}">${m.t}</span>`;
}

function renderMembers() {
  document.getElementById('main').innerHTML = `
    <div class="page-head">
      <div><div class="page-title">회원 관리</div><div class="page-sub">소식이 친구들 ${DATA.members.length}명</div></div>
      <div class="page-actions"><button class="btn primary" onclick="addMember()">+ 회원 추가</button></div>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>ID</th><th>이름</th><th>전화</th><th>가입경로</th><th>가입일</th><th>참여 딜</th><th>등급</th><th>카톡연동</th><th>작업</th></tr></thead>
        <tbody>${DATA.members.map((m,i) => `
          <tr>
            <td><b>${m.id}</b></td>
            <td>${m.name}</td>
            <td>${m.phone}</td>
            <td><span class="pill ${m.channel === 'kakao' ? 'orange' : m.channel === 'naver' ? 'green' : m.channel === 'instagram' ? 'red' : 'gray'}">${({kakao:'💬 카카오', naver:'🟢 네이버', instagram:'📷 인스타'})[m.channel] || '직접가입'}</span></td>
            <td>${m.joinDate}</td>
            <td>${m.deals}건</td>
            <td><span class="pill ${m.status === 'vip' ? 'orange' : 'gray'}">${m.status === 'vip' ? 'VIP' : '일반'}</span></td>
            <td><span class="pill ${m.kakao === 'connected' ? 'green' : m.kakao === 'pending' ? 'orange' : 'red'}">${m.kakao === 'connected' ? '연동' : m.kakao === 'pending' ? '대기' : '미연동'}</span></td>
            <td>
              <button class="btn sm" onclick="editMember(${i})">수정</button>
              <button class="btn sm danger" onclick="deleteMember(${i})">삭제</button>
            </td>
          </tr>`).join('')}</tbody>
      </table>
    </div>
  `;
}

const PLZ_KEY = 'modilMobilePlaza_v1';
function loadPlazaAdmin() {
  try { const s = localStorage.getItem(PLZ_KEY); if (s) return JSON.parse(s); } catch(e) {}
  return { posts: [] };
}
function savePlazaAdmin(p) { try { localStorage.setItem(PLZ_KEY, JSON.stringify(p)); } catch(e) {} }

function renderPlaza() {
  const p = loadPlazaAdmin();
  const sorted = p.posts.slice().sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));
  document.getElementById('main').innerHTML = `
    <div class="page-head">
      <div><div class="page-title">딜 광장 관리</div><div class="page-sub">총 ${sorted.length}개 포스트</div></div>
    </div>

            <td>👍 ${post.likes || 0} / 😂 ${post.lols || 0}</td>
            <td style="font-size:11px;color:#888">${post.ago != null ? (post.ago < 1 ? '방금' : post.ago < 60 ? post.ago + '분 전' : Math.floor(post.ago/60) + '시간 전') : '-'}</td>
            <td>
              <button class="btn sm ${post.pinned ? 'danger' : 'primary'}" onclick="togglePin('${post.id}')">${post.pinned ? '📌 고정 해제' : '📌 상단 고정'}</button>

            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function togglePin(id) {
  const p = loadPlazaAdmin();
  const post = p.posts.find(x => x.id === id);
  if (!post) return;
  post.pinned = !post.pinned;
  savePlazaAdmin(p);
  renderPlaza();
}

function deletePlazaPost(id) {
  if (!confirm('이 포스트를 삭제하시겠습니까?')) return;
  const p = loadPlazaAdmin();
  p.posts = p.posts.filter(x => x.id !== id);
  savePlazaAdmin(p);
  renderPlaza();
}

  DATA.stats.activeNego = +document.getElementById('stN').value;
  save();
  alert('✅ 설정이 저장되었습니다!');
}
function resetAllData() {
  if (!confirm('모든 데이터를 기본값으로 되돌리시겠습니까?\n작업하신 내용이 모두 사라집니다.')) return;
  DATA = resetData();
  save();
  alert('✅ 데이터가 초기화되었습니다.');
}

renderDashboard();
</script>
